<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>OGOH — Suv toʻsiq ogohlantirish tizimi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #050608; overflow: hidden;
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  #root { height: 100%; }
  button { font: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes ogFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ogSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes ogPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.14); opacity: 0.65; } }
  @keyframes ogRing { 0% { transform: scale(0.92); opacity: 0.55; } 70% { opacity: 0; } 100% { transform: scale(1.28); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
